# Local development — build from source + optional Ollama
# Usage:
#   cp .env.example .env
#   docker compose up --build
#
# With Ollama (local LLM):
#   docker compose --profile ollama up --build

services:
  agents-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: agileai-agents:local
    container_name: agileai-agents-api
    ports:
      - "${AGENTS_PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      LLM_PROVIDER: ${LLM_PROVIDER:-groq}
      LLM_MODE: ${LLM_MODE:-live}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GROQ_MODEL: ${GROQ_MODEL:-llama-3.3-70b-versatile}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3}
      LLM_MAX_RETRIES: ${LLM_MAX_RETRIES:-5}
      LLM_INITIAL_BACKOFF: ${LLM_INITIAL_BACKOFF:-1.0}
      LLM_MAX_BACKOFF: ${LLM_MAX_BACKOFF:-60.0}
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health', timeout=5)",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  ollama:
    profiles: ["ollama"]
    image: ollama/ollama:latest
    container_name: agileai-ollama
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

volumes:
  ollama_data:
