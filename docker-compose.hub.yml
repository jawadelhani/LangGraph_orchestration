# Production — pull Agents image from Docker Hub (no local build)
#
# 1. cp .env.example .env
# 2. Set DOCKERHUB_USERNAME in .env
# 3. docker compose -f docker-compose.hub.yml pull
# 4. docker compose -f docker-compose.hub.yml up -d
#
# Image expected on Docker Hub:
#   YOUR_DOCKERHUB_USERNAME/agileai-agents:latest

services:
  agents-api:
    image: ${DOCKERHUB_USERNAME}/agileai-agents:${AGENTS_IMAGE_TAG:-latest}
    container_name: agileai-agents-api
    ports:
      - "${AGENTS_PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      LLM_PROVIDER: ${LLM_PROVIDER:-groq}
      LLM_MODE: ${LLM_MODE:-live}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GROQ_MODEL: ${GROQ_MODEL:-llama-3.3-70b-versatile}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3}
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health', timeout=5)",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  ollama:
    profiles: ["ollama"]
    image: ollama/ollama:latest
    container_name: agileai-ollama
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

volumes:
  ollama_data:
